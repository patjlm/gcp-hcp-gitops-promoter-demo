apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    demo/sector: integration-main
  name: hypershift
  namespace: argocd
spec:
  destination:
    namespace: hypershift
    server: https://kubernetes.default.svc
  ignoreDifferences:
  - group: apiextensions.k8s.io
    jsonPointers:
    - /status
    kind: CustomResourceDefinition
  project: default
  source:
    kustomize:
      images: []
      patches:
      - patch: |
          - op: add
            path: /spec/template/spec/containers/0/env/-
            value:
              name: GCP_PROJECT
              value: '{{ .Values.project_id }}'
          - op: add
            path: /spec/template/spec/containers/0/env/-
            value:
              name: GCP_REGION
              value: '{{ .Values.region }}'
        target:
          kind: Deployment
          name: operator
    path: kustomize/hypershift
    repoURL: '{{ .Values.git_repo }}'
    targetRevision: '{{ .Values.git_revision }}'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
