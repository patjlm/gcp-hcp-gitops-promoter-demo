apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: hyperfleet-placement-adapter
  namespace: argocd
spec:
  destination:
    namespace: hyperfleet
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      valuesObject:
        projectId: '{{ .Values.project_id }}'
        pubsub:
          subscription: hyperfleet-cluster-events-placement-adapter
        region: '{{ .Values.region }}'
        serviceAccount:
          annotations:
            iam.gke.io/gcp-service-account: placement-adapter@{{ .Values.project_id
              }}.iam.gserviceaccount.com
    path: helm/charts/hyperfleet-placement-adapter
    repoURL: '{{ .Values.git_repo }}'
    targetRevision: '{{ .Values.git_revision }}'
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
