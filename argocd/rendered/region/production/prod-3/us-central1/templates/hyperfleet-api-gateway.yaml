apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: hyperfleet-api-gateway
  namespace: argocd
spec:
  destination:
    namespace: hyperfleet
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      valuesObject:
        infraId: '{{ .Values.infra_id }}'
        projectId: '{{ .Values.project_id }}'
        region: '{{ .Values.region }}'
        shortenv: '{{ .Values.shortenv }}'
    path: helm/charts/hyperfleet-api-gateway
    repoURL: '{{ .Values.git_repo }}'
    targetRevision: '{{ .Values.git_revision }}'
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
