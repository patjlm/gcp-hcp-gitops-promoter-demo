apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: hyperfleet-api
  namespace: argocd
spec:
  destination:
    namespace: hyperfleet
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      valuesObject:
        auth:
          jwt:
            enabled: false
        image:
          tag: c3f7a12
        postgresql:
          enabled: true
    path: charts
    repoURL: https://github.com/openshift-hyperfleet/hyperfleet-api
    targetRevision: c3f7a12e9b0d45678901bcdef234567890d8e4f5
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
