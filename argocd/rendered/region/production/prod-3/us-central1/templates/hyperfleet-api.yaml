apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: hyperfleet-api
  namespace: argocd
spec:
  destination:
    namespace: hyperfleet
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      valuesObject:
        auth:
          jwt:
            enabled: false
        image:
          tag: e7a2b3c
        postgresql:
          enabled: true
    path: charts
    repoURL: https://github.com/openshift-hyperfleet/hyperfleet-api
    targetRevision: e7a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
