apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  name: external-dns
  namespace: argocd
spec:
  destination:
    namespace: external-dns
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: external-dns
    helm:
      valuesObject:
        domainFilters:
        - '{{ .Values.shortenv }}.gcp-hcp.example.com'
        extraArgs:
        - --google-project={{ .Values.global_project_id }}
        policy: sync
        provider: google
        serviceAccount:
          annotations:
            iam.gke.io/gcp-service-account: external-dns@{{ .Values.project_id }}.iam.gserviceaccount.com
        sources:
        - ingress
        - service
        - gateway-httproute
        txtOwnerId: '{{ .Values.project_id }}'
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    targetRevision: 1.15.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
