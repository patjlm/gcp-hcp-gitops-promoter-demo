apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  name: maestro-server-cloud-resources
  namespace: argocd
spec:
  destination:
    namespace: maestro
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      valuesObject:
        database:
          enabled: true
        gcp:
          projectId: '{{ .Values.project_id }}'
          region: '{{ .Values.region }}'
        pubsub:
          enabled: true
          topics:
          - sourceEvents
          - sourceBroadcast
          - agentEvents
          - agentBroadcast
    path: charts/maestro-server-cloud-resources
    repoURL: https://github.com/openshift-online/maestro
    targetRevision: v0.5.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
