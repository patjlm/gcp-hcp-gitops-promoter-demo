apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hyperfleet-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/openshift-hyperfleet/hyperfleet-api
    targetRevision: c3f7a12e9b0d45678901bcdef234567890d8e4f5
    path: charts
    helm:
      valuesObject:
        image:
          tag: c3f7a12
        auth:
          jwt:
            enabled: false
        postgresql:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: hyperfleet
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
