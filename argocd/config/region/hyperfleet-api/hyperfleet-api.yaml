apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hyperfleet-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/openshift-hyperfleet/hyperfleet-api
    targetRevision: b8e4d96f0aa1234567890abcdef123456a7f3c21
    path: charts
    helm:
      valuesObject:
        image:
          tag: b8e4d96
        auth:
          jwt:
            enabled: false
        postgresql:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: hyperfleet
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
