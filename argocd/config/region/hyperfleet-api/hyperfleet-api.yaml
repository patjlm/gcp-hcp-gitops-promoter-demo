apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hyperfleet-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/openshift-hyperfleet/hyperfleet-api
    targetRevision: e7a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0
    path: charts
    helm:
      valuesObject:
        image:
          tag: e7a2b3c
        auth:
          jwt:
            enabled: false
        postgresql:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: hyperfleet
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
