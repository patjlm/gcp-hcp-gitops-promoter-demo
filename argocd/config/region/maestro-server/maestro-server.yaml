apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maestro-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/openshift-online/maestro
    targetRevision: v0.5.0
    path: charts/maestro-server
    helm:
      valuesObject:
        environment: production
        serviceAccount:
          annotations:
            iam.gke.io/gcp-service-account: 'maestro@{{ .Values.project_id }}.iam.gserviceaccount.com'
        gcp:
          projectId: '{{ .Values.project_id }}'
          region: '{{ .Values.region }}'
        db:
          isEmbedded: false
        mqtt:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: maestro
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
